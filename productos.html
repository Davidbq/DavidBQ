<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Buscar Productos</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="./productos.js" defer></script>
  </head>
  <body class="bg-light">
    <div class="container mt-5">
      <h1 class="text-center mb-4">
        🛒 Busca un Producto
      </h1>
 
      <!-- Select de categorías -->
      <div class="mb-3">
        <label for="selectCategoria" class="form-label">Selecciona una categoría:</label>
        <select id="selectCategoria" class="form-select">
          <option value="">Cargando categorías...</option>
        </select>
      </div>
 
      <!-- Select de productos (oculto hasta elegir categoría) -->
      <div class="mb-3 d-none" id="contenedorProducto">
        <label for="selectProducto" class="form-label">Selecciona un producto:</label>
        <select id="selectProducto" class="form-select">
          <option value="">Selecciona un producto</option>
        </select>
      </div>
 
      <!-- Detalle del producto -->
      <div id="detalleProducto" class="card shadow-sm d-none">
        <div class="card-body">
          <h2 id="productoNombre" class="card-title text-primary"></h2>
 
          <p><strong>Descripción:</strong> <span id="productoDescripcion"></span></p>
          <p><strong>Marca:</strong> <span id="productomarca"></span></p>
          <p><strong>Categoría:</strong> <span id="productoCategoria"></span></p>
          <p><strong>Precio:</strong> $<span id="productoPrecio"></span></p>
          <p><strong>Descuento:</strong> <span id="productoDescuento"></span>%</p>
          <p><strong>Precio con descuento:</strong> $<span id="productoPrecioFinal"></span></p>
          <p><strong>Calificación:</strong> ⭐ <span id="productoRating"></span> / 5</p>
          <p><strong>Stock disponible:</strong> <span id="productoStock"></span> unidades</p>
          <p><strong>Clasificación de precio:</strong> <span id="precioClasificacion"></span></p>
 
          <!-- Barra de rating -->
          <label class="form-label"><strong>Nivel de calificación:</strong></label>
          <div class="progress mb-3" style="height: 25px;">
            <div id="barraRating" class="progress-bar" role="progressbar" style="width: 0%">
              <span id="porcentajeRating">0 / 5</span>
            </div>
          </div>
 
          <!-- Imagen del producto -->
          <img
            id="productoImagen"
            class="img-fluid rounded"
            alt="Imagen del producto"
            style="max-height: 300px; object-fit: contain;"
          />
        </div>
      </div>
    </div>
  </body>
</html>
