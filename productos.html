<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tienda - Buscar Productos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="./productos.js" defer></script>
</head>
<body class="bg-light">
  <div class="container mt-5 pb-5">
    <h1 class="text-center mb-4">🛒 Mi Tienda Digital</h1>

    <div class="card shadow-sm p-4 mb-4">
      <div class="mb-3">
        <label for="selectCategoria" class="form-label">1. Selecciona una categoría:</label>
        <select id="selectCategoria" class="form-select">
          <option value="">Cargando categorías...</option>
        </select>
      </div>

      <div class="mb-3 d-none" id="contenedorProducto">
        <label for="selectProducto" class="form-label">2. Selecciona un producto:</label>
        <select id="selectProducto" class="form-select">
          <option value="">Selecciona un producto</option>
        </select>
      </div>
    </div>

    <div id="detalleProducto" class="card shadow-sm d-none mb-5">
      <div class="card-body">
        <div class="row">
          <div class="col-md-4 text-center">
            <img id="productoImagen" class="img-fluid rounded border" alt="Producto" style="max-height: 250px;">
          </div>
          <div class="col-md-8">
            <h2 id="productoNombre" class="text-primary"></h2>
            <p id="productoDescripcion" class="text-muted"></p>
            <p><strong>Precio:</strong> <span class="badge bg-success fs-5">$<span id="productoPrecioFinal"></span></span></p>
            <button id="btnAgregar" class="btn btn-primary btn-lg">Añadir al Carrito</button>
          </div>
        </div>
      </div>
    </div>

    <div id="seccionCarrito" class="card shadow border-primary">
      <div class="card-header bg-primary text-white">
        <h3 class="mb-0">Tu Carrito</h3>
      </div>
      <div class="card-body">
        <table class="table table-hover">
          <thead>
            <tr>
              <th>Producto</th>
              <th>Precio</th>
              <th>Acción</th>
            </tr>
          </thead>
          <tbody id="listaCarrito">
            </tbody>
          <tfoot>
            <tr class="table-active">
              <td class="fw-bold">TOTAL:</td>
              <td class="fw-bold text-success">$<span id="totalVenta">0.00</span></td>
              <td></td>
            </tr>
          </tfoot>
        </table>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
