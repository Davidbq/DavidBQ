<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Que puede hacer java script</h2>

    <p>java script puede cambiar valores en los atributos de HTML</p>

    <p>en este caso el valor del src (source) atributos de una imagen </p>

    <button onclick="document.getElementById('myimage').src='focon.gif'">ON LUZ ENCENDIDA</button>

    <img id="myimage" src="focof.gif" style="width: 100px;">

    <button onclick="document.getElementById('myimage').src='focof.gif'">OFF LUZ APAGADA</button>

</body>
</html>
